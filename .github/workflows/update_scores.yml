name: Update NBA Scores

on:
  schedule:
    - cron: '0 * * * *'   # every hour, on the hour
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Fetch scores
        run: python scripts/fetch_scores.py

      - name: Generate Excel (if picks exist)
        run: |
          if [ -f data/picks.json ]; then
            python scripts/generate_excel.py
          fi

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scores.json data/bracket.xlsx
          git diff --cached --quiet || \
            (git commit -m "chore: update scores $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)
