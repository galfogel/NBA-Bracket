name: Update NBA Scores

on:
  schedule:
    - cron: '0 * * * *'   # every hour, on the hour
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet requests
        continue-on-error: false  # if pip fails, no point continuing

      - name: Fetch scores
        run: python scripts/fetch_scores.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scores.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update scores $(date -u '+%Y-%m-%d %H:%M UTC')"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              if [ $i -eq 3 ]; then
                echo "Push failed after 3 attempts"
                exit 1
              fi
              echo "Attempt $i failed, retrying..."
              sleep 5
            done
          fi
