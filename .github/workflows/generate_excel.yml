name: Generate Excel Bracket

on:
  schedule:
    - cron: '15 * * * *'   # 15 min after scores run (scores run on the hour)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Generate bracket.xlsx
        run: python scripts/generate_excel.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bracket.xlsx
          git diff --cached --quiet || \
            (git commit -m "Auto-update bracket.xlsx [skip ci]" && git push)
