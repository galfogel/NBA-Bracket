name: Cache Bust on Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'data/scores.json'   # hourly score updates don't need a cache bust

permissions:
  contents: write

jobs:
  bust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Stamp commit SHA into asset URLs
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          sed -i "s/?v=[^\"']*/?v=${SHORT_SHA}/g" index.html

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: cache bust $(git rev-parse --short HEAD)"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              if [ $i -eq 3 ]; then
                echo "Push failed after 3 attempts"
                exit 1
              fi
              echo "Attempt $i failed, retrying..."
              sleep 5
            done
          fi
