<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NBA Playoffs Bracket 2026</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div id="login-overlay" class="login-overlay">
  <div class="login-box">
    <div class="login-logo">🏀</div>
    <h2>NBA Playoffs 2026</h2>
    <p class="login-sub">Enter your name to join the bracket</p>
    <input id="login-name" type="text"     placeholder="Your name"     maxlength="40" autocomplete="off" />
    <input id="login-pass" type="password" placeholder="Password (optional)" maxlength="60" autocomplete="off" />
    <div id="login-msg" class="login-msg"></div>
    <button id="login-btn" class="btn-primary login-btn">Enter</button>
  </div>
</div>

<!-- APP SHELL -->
<header>
  <h1>🏀 NBA Playoffs 2026</h1>
  <nav>
    <button class="tab-btn" data-tab="bracket">My Picks</button>
    <button class="tab-btn" data-tab="picks">All Picks</button>
    <button class="tab-btn" data-tab="participants">Results</button>
    <button class="tab-btn" data-tab="leaderboard">Leaderboard</button>
  </nav>
  <div id="user-display" class="user-display"></div>
</header>

<main>
  <div id="tab-bracket"      class="tab-content"></div>
  <div id="tab-picks"        class="tab-content"></div>
  <div id="tab-participants" class="tab-content"></div>
  <div id="tab-leaderboard"  class="tab-content"></div>
</main>

<script src="app.js"></script>
</body>
</html>
