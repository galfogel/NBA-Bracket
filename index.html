<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NBA Playoffs Bracket 2026</title>
  <link rel="stylesheet" href="style.css?v=e0deae6" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

<!-- PLATFORM GATE OVERLAY -->
<div id="gate-overlay" class="login-overlay">
  <div class="login-box">
    <div class="login-logo">🏀</div>
    <h2>NBA Playoffs 2026</h2>
    <p class="login-sub">Enter the access code to continue</p>
    <input id="gate-pass" type="password" placeholder="Access code" maxlength="60" autocomplete="off" />
    <div id="gate-msg" class="login-msg"></div>
    <button id="gate-btn" class="btn-primary login-btn">Enter</button>
  </div>
</div>

<!-- LOGIN OVERLAY -->
<div id="login-overlay" class="login-overlay hidden">
  <div class="login-box">
    <div class="login-logo">🏀</div>
    <h2>NBA Playoffs 2026</h2>
    <div class="login-tabs">
      <button class="login-tab active" data-mode="signin">Sign In</button>
      <button class="login-tab" data-mode="signup">Sign Up</button>
    </div>
    <input id="login-name" type="text"     placeholder="Username" maxlength="40" autocomplete="off" />
    <input id="login-pass" type="password" placeholder="Password" maxlength="60" autocomplete="off" />
    <div id="login-msg" class="login-msg"></div>
    <button id="login-btn" class="btn-primary login-btn">Sign In</button>
  </div>
</div>

<!-- SYNC ERROR BANNER -->
<div id="sync-error" class="sync-toast hidden" role="alert">
  <span class="sync-toast-msg"></span>
  <button class="sync-toast-close" type="button" aria-label="Dismiss">×</button>
</div>

<!-- APP SHELL -->
<header>
  <h1>🏀 NBA Playoffs 2026</h1>
  <nav>
    <button class="tab-btn" data-tab="bracket">My Picks</button>
    <button class="tab-btn" data-tab="picks">All Picks</button>
    <button class="tab-btn" data-tab="participants">Results</button>
    <button class="tab-btn" data-tab="leaderboard">Leaderboard</button>
    <button class="tab-btn" data-tab="info">Rules</button>
  </nav>
  <div id="user-display" class="user-display"></div>
</header>

<main>
  <div id="tab-bracket"      class="tab-content"></div>
  <div id="tab-picks"        class="tab-content"></div>
  <div id="tab-participants" class="tab-content"></div>
  <div id="tab-leaderboard"  class="tab-content"></div>
  <div id="tab-info"         class="tab-content"></div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="app.js?v=e0deae6"></script>
</body>
</html>
